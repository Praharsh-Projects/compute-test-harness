name: Compute Harness CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build workloads
        run: make build

      - name: Run unit tests
        run: PYTHONPATH=. pytest -q

      - name: Run harness suites
        run: |
          PYTHONPATH=. python -m harness.runner --config-dir configs --bin-dir workloads/bin --baseline baselines/baseline.json --report-dir reports/latest

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: compute-harness-report
          path: reports/latest/
